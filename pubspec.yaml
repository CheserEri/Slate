name: slate
description: "SMB Gallery - SMB remote album with local album support"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  photo_manager: ^3.6.0
  flutter_rust_bridge: ^2.12.0
  flutter_riverpod: ^2.6.1
  cached_network_image: ^3.4.1
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^6.1.3
  path_provider: ^2.1.5
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true